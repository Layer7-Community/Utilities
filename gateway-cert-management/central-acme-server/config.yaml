# Central ACME Server Configuration
# Manages certificates for multiple Layer7 API Gateway deployments

# Global settings
renewal_threshold_days: 15  # Renew certificates when they have less than 15 days until expiry

# Gateway configurations
gateways:
  # Example Gateway 1 - Production
  - name: gateway-prod
    url: https://gateway-prod.brcmlabs.com/graphman
    username: admin
    password: ${GATEWAY_PROD_PASSWORD}  # Use environment variable
    verify_ssl: false
    
    certificates:
      - alias: ssl
        domain: "gateway-prod.brcmlabs.com"
        csr_params:
          subjectDn: "cn=gateway-prod.brcmlabs.com,o=Layer7,c=US"
          hashAlgorithm: "SHA256"
          subjectAlternativeNames:
            - name: "DNS Name"
              value: "gateway-prod.brcmlabs.com"
  
  # Example Gateway 2 - Staging
  - name: gateway-staging
    url: https://gateway-staging.brcmlabs.com/graphman
    username: admin
    password: ${GATEWAY_STAGING_PASSWORD}
    verify_ssl: false
    
    certificates:
      - alias: ssl
        domain: "gateway-staging.brcmlabs.com"
        csr_params:
          subjectDn: "cn=gateway-staging.brcmlabs.com,o=Layer7,c=US"
          hashAlgorithm: "SHA256"
          subjectAlternativeNames:
            - name: "DNS Name"
              value: "gateway-staging.brcmlabs.com"
  
  # Example Gateway 3 - Development
  - name: gateway-dev
    url: https://gateway-dev.brcmlabs.com/graphman
    username: admin
    password: ${GATEWAY_DEV_PASSWORD}
    verify_ssl: false
    
    certificates:
      - alias: ssl
        domain: "gateway-dev.brcmlabs.com"
        csr_params:
          subjectDn: "cn=gateway-dev.brcmlabs.com,o=Layer7,c=US"
          hashAlgorithm: "SHA256"
          subjectAlternativeNames:
            - name: "DNS Name"
              value: "gateway-dev.brcmlabs.com"

# Notes:
# - The CSR is generated by the Gateway itself using the generateCSR mutation
# - The signed certificate is then applied back to the Gateway using replaceCertChain
# - Passwords are provided via environment variables
# - Multiple certificates can be managed per gateway

